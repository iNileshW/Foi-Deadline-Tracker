name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest tests/ -v

  security:
    name: Security scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install security tools
        run: pip install bandit pip-audit

      - name: Bandit SAST scan
        # -ll = report LOW severity and above at LOW confidence and above.
        # Skip test files (contain deliberate hostile-input fixtures) and
        # the cached JSON feed.
        run: bandit -r . -x ./tests,./templates,./.github,./backups -ll

      - name: pip-audit (declared runtime deps)
        run: pip-audit --strict -r requirements.txt

      - name: pip-audit (dev deps)
        run: pip-audit --strict -r requirements-dev.txt

  package:
    name: Package artifact
    needs: [test, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build tarball
        id: build
        run: |
          VERSION="$(date -u +%Y%m%dT%H%M%SZ)-${GITHUB_SHA::7}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          tar \
            --exclude='./.git' \
            --exclude='./__pycache__' \
            --exclude='./.pytest_cache' \
            --exclude='./foi.db' \
            --exclude='./backups' \
            --exclude='./.github' \
            -czf "../foi-tracker-$VERSION.tar.gz" .
          mv "../foi-tracker-$VERSION.tar.gz" .

      - uses: actions/upload-artifact@v4
        with:
          name: foi-tracker-${{ steps.build.outputs.version }}
          path: foi-tracker-*.tar.gz
          retention-days: 30
